name: Conda

on:
  push:
    branches:
      - master
      - 'dev**'
  pull_request:
  release:
    types:
      - released

jobs:
  conda-win:
    runs-on: windows-2022
    defaults:
      run:
        shell: powershell
    steps:
    - uses: actions/checkout@v6
      with:
       path: workspace/src/tesseract_python
    - name: install-depends
      shell: cmd
      run: |
        python -m pip install vcs2l setuptools -q
    - name: vcs import
      run: >
        vcs import --input "${{ github.workspace }}/workspace/src/tesseract_python/dependencies.rosinstall" workspace/src/
    - uses: conda-incubator/setup-miniconda@v4
      with:
        channel-priority: strict
        environment-file: workspace/src/tesseract_python/.github/workflows/conda/environment.yml
        auto-update-conda: true
        activate-environment: tesseract-build
        channels: conda-forge
        conda-remove-defaults: "true"
    - name: build and test
      run: |
        conda info
        conda list
        mkdir conda
        xcopy /E workspace\src\tesseract_python\.github\workflows\conda conda
        cd conda
        conda-smithy regenerate
        
        rattler-build build -m .ci_support/win_64_python3.13.____cp313.yaml --recipe recipe/recipe.yaml --output-dir="${{ runner.temp }}\ws"

  conda-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
    - uses: actions/checkout@v6
      with:
        path: workspace/src/tesseract_python
    - name: install-depends
      run: |
        python -m pip install vcs2l setuptools -q
    - name: vcs import
      run: >
        vcs import --input "${{ github.workspace }}/workspace/src/tesseract_python/dependencies_with_ext.rosinstall" workspace/src/
    - uses: conda-incubator/setup-miniconda@v4
      with:
        channel-priority: strict
        environment-file: workspace/src/tesseract_python/.github/workflows/conda/environment.yml
        auto-update-conda: true
        activate-environment: tesseract-build
        channels: conda-forge
        conda-remove-defaults: "true"
    - name: build and test
      run: |
        conda info
        conda list

        cp -r workspace/src/tesseract_python/.github/workflows/conda ./conda
        cd conda
        conda-smithy regenerate
        
        rattler-build build -m .ci_support/linux_64_python3.13.____cp313.yaml --recipe recipe/recipe.yaml
  conda-mac:
    runs-on: macos-15
    defaults:
      run:
        shell: bash -el {0}
    steps:
    - uses: actions/checkout@v6
      with:
        path: workspace/src/tesseract_python
    - name: install-depends
      run: |
        python -m pip install vcs2l -q
    - name: vcs import
      run: >
        vcs import --input "${{ github.workspace }}/workspace/src/tesseract_python/dependencies.rosinstall" workspace/src/
    - uses: conda-incubator/setup-miniconda@v4
      with:
        channel-priority: strict
        environment-file: workspace/src/tesseract_python/.github/workflows/conda/environment.yml
        activate-environment: tesseract-build
        channels: conda-forge
        conda-remove-defaults: "true"
    - name: build and test
      run: |
        conda info
        conda list
        
        cp -r workspace/src/tesseract_python/.github/workflows/conda ./conda
        cd conda
        conda-smithy regenerate --no-check-uptodate
        
        rattler-build build -m .ci_support/osx_64_python3.13.____cp313.yaml  --recipe recipe/recipe.yaml

